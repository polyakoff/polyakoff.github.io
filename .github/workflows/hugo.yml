name: Deploy Hugo site to Pages
on:
  push:
    branches: ["main"]
  schedule:
    # GitHub cron is UTC and DST-unaware — list both offsets; the gate job below
    # lets through only the one that lands in the 11:00 / 22:00 Kyiv hour today.
    - cron: "11 8 * * *"    # 11:11 Kyiv in summer (EEST, UTC+3)
    - cron: "11 9 * * *"    # 11:11 Kyiv in winter (EET,  UTC+2)
    - cron: "22 19 * * *"   # 22:22 Kyiv in summer
    - cron: "22 20 * * *"   # 22:22 Kyiv in winter
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: false
jobs:
  gate:                                    # DST-aware: a scheduled run proceeds only in the 11:00/22:00 Kyiv hour
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.check.outputs.go }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then echo "go=true" >> "$GITHUB_OUTPUT"; exit 0; fi
          H=$(TZ=Europe/Kyiv date +%H)
          if [ "$H" = "11" ] || [ "$H" = "22" ]; then
            echo "Kyiv hour $H — proceeding"; echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Kyiv hour $H — off-DST cron slot, skipping"; echo "go=false" >> "$GITHUB_OUTPUT"
          fi
  build:
    needs: gate
    if: needs.gate.outputs.go == 'true'
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.140.2
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Refresh VPO draw schedule (soft-fail)
        run: node scripts/fetch-vpo-draws.mjs
        continue-on-error: true
      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
        run: hugo --gc --minify
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
